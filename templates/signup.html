{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<h1>Sign Up</h1>

<div class="card">
    <h2>Let's get you signed up!</h2>
    <form method="POST" class="secondary">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required><br>

        <label for="first-name">First Name:</label>
        <input type="text" id="first-name" name="first_name" required><br>

        <label for="last-name">Last Name:</label>
        <input type="text" id="last-name" name="last_name" required><br>

        <label for="ssn">SSN:</label>
        <input type="text" id="ssn" name="ssn" required><br>

        <label for="street-address">Street Address:</label>
        <input type="text" id="street-address" name="street_address" required><br>

        <label for="city">City:</label>
        <input type="text" id="city" name="city" required><br>

        <label for="state">State:</label>
        <input type="text" id="state" name="state" required><br>

        <label for="zip-code">Zip Code:</label>
        <input type="text" id="zip-code" name="zip_code" required><br>

        <label for="phone-number">Phone Number:</label>
        <input type="text" id="phone-number" name="phone_number" required><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br>
        
        <div class="actions">
            <button type="submit" class="button-primary">Sign Up</button>
            <a href="/login" class="button-outline">Already have an account? Log In</a>
        </div>
    </form>
</div>
{% endblock %}
